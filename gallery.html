    <style>
      body {
        background-color: #1c110c;
        background-image:
          radial-gradient(
            circle at 50% 50%,
            rgba(242, 202, 80, 0.05) 0%,
            transparent 70%
          ),
          url("https://www.transparenttextures.com/patterns/black-paper.png");
        overflow-x: hidden;
      }

      .glass-node {
        background: rgba(41, 29, 23, 0.6);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(242, 202, 80, 0.2);
        transition: all 0.5s ease-out;
      }

      .glass-node:hover {
        border-color: rgba(242, 202, 80, 0.8);
        box-shadow: 0 0 30px rgba(242, 202, 80, 0.15);
        transform: translateY(-4px) scale(1.02);
      }

      .node-portrait {
        filter: grayscale(100%);
        transition: filter 0.6s ease;
      }

      .glass-node:hover .node-portrait {
        filter: grayscale(0%);
      }

      .particle {
        position: fixed;
        background: #f2ca50;
        border-radius: 50%;
        pointer-events: none;
        opacity: 0.3;
        z-index: 0;
        animation: float 20s infinite linear;
      }

      @keyframes float {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 0;
        }
        50% {
          opacity: 0.4;
        }
        100% {
          transform: translateY(-100vh) rotate(360deg);
          opacity: 0;
        }
      }

      .scroll-container::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      .scroll-container::-webkit-scrollbar-thumb {
        background: #d4af37;
        border-radius: 10px;
      }
      .scroll-container::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.1);
      }
    </style>
